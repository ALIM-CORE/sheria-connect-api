spring.application.name=${APP_NAME}

# ===============================
# Environment
# ===============================
app.env=${APP_ENV}

# ===============================
# Server
# ===============================
server.port=6001
server.address=0.0.0.0
server.forward-headers-strategy=framework

# ===============================
# Database Configuration
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# Database Migrations (Flyway)
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ===============================
# Auth Cookies
# ===============================
app.auth.refresh-cookie.secure=${REFRESH_COOKIE_SECURE:false}
app.auth.refresh-cookie.same-site=${REFRESH_COOKIE_SAME_SITE:Lax}
app.auth.refresh-cookie.path=${REFRESH_COOKIE_PATH:/}

# ===============================
# Bootstrap Owner Accounts
# ===============================
app.bootstrap.super-admin.email=${SUPER_ADMIN_EMAIL:}
app.bootstrap.super-admin.password=${SUPER_ADMIN_PASSWORD:}
app.bootstrap.super-admin.name=${SUPER_ADMIN_NAME:Super Admin}
app.bootstrap.system-admin.email=${SYSTEM_ADMIN_EMAIL:}
app.bootstrap.system-admin.password=${SYSTEM_ADMIN_PASSWORD:}
app.bootstrap.system-admin.name=${SYSTEM_ADMIN_NAME:System Admin}

# ===============================
# Evidence Storage
# ===============================
app.evidence.storage-root=${EVIDENCE_STORAGE_ROOT:uploads/evidence}
app.evidence.max-file-size-bytes=${EVIDENCE_MAX_FILE_SIZE_BYTES:10485760}
app.evidence.allowed-content-types=${EVIDENCE_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp,video/mp4,audio/mpeg,audio/mp4,audio/wav,application/pdf,text/plain,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document}
spring.servlet.multipart.max-file-size=${EVIDENCE_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${EVIDENCE_MAX_REQUEST_SIZE:12MB}

# ===============================
# Connection Pool (Hikari)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000

# ===============================
# Email (SMTP)
# ===============================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

spring.mail.from.name=${MAIL_FROM_NAME}
spring.mail.from.address=${MAIL_FROM_ADDRESS}

# ===============================
# Logging
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.mail=INFO
